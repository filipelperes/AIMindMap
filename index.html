    <!--
      Prevent theme flash: sync data-theme before React hydrates.
      Reads the persisted preference from localStorage; falls back to
      system preference or 'dark' (default).
    -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('aimindmap-theme');
          if (!theme) {
            theme = window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
          }
          document.documentElement.setAttribute('data-theme', theme);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.setAttribute('content', theme === 'dark' ? '#080B1A' : '#F0F4FF');
          }
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
