<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D1128"/>
      <stop offset="100%" stop-color="#080B1A"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#00FFF0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00FFF0" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00FFF0" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="50" fill="url(#glow)"/>
  <!-- Connection lines -->
  <g stroke="#00FFF0" stroke-width="1.2" stroke-linecap="round" opacity="0.5">
    <!-- Spine: center to inner ring -->
    <line x1="50" y1="50" x2="32" y2="30"/>
    <line x1="50" y1="50" x2="68" y2="30"/>
    <line x1="50" y1="50" x2="68" y2="65"/>
    <line x1="50" y1="50" x2="35" y2="72"/>
    <line x1="50" y1="50" x2="50" y2="20"/>
    <line x1="50" y1="50" x2="72" y2="48"/>
    <!-- Outer connections -->
    <line x1="32" y1="30" x2="50" y2="20" opacity="0.3"/>
    <line x1="68" y1="30" x2="72" y2="48" opacity="0.3"/>
    <line x1="72" y1="48" x2="68" y2="65" opacity="0.3"/>
    <line x1="68" y1="65" x2="35" y2="72" opacity="0.3"/>
    <line x1="35" y1="72" x2="32" y2="30" opacity="0.3"/>
  </g>
  <!-- Nodes -->
  <!-- Center node -->
  <circle cx="50" cy="50" r="8" fill="#080B1A" stroke="#00FFF0" stroke-width="2.5" filter="url(#neon)"/>
  <circle cx="50" cy="50" r="3.5" fill="#00FFF0"/>
  <!-- Inner ring nodes -->
  <circle cx="32" cy="30" r="4.5" fill="#080B1A" stroke="#00B0FF" stroke-width="2"/>
  <circle cx="32" cy="30" r="2" fill="#00B0FF"/>
  <circle cx="68" cy="30" r="4.5" fill="#080B1A" stroke="#FF006E" stroke-width="2"/>
  <circle cx="68" cy="30" r="2" fill="#FF006E"/>
  <circle cx="68" cy="65" r="4.5" fill="#080B1A" stroke="#76FF03" stroke-width="2"/>
  <circle cx="68" cy="65" r="2" fill="#76FF03"/>
  <circle cx="35" cy="72" r="4.5" fill="#080B1A" stroke="#D500F9" stroke-width="2"/>
  <circle cx="35" cy="72" r="2" fill="#D500F9"/>
  <circle cx="50" cy="20" r="4.5" fill="#080B1A" stroke="#FFAB00" stroke-width="2"/>
  <circle cx="50" cy="20" r="2" fill="#FFAB00"/>
  <circle cx="72" cy="48" r="4.5" fill="#080B1A" stroke="#FF1744" stroke-width="2"/>
  <circle cx="72" cy="48" r="2" fill="#FF1744"/>
</svg>
